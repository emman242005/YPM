<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parent Dashboard | Young Peacemakers Organization</title>
<link rel="icon" type="image/png" href="assets/images/logo.png">
<link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="nav-logo">
      <img src="assets/images/logo.png" alt="Young Peacemakers Organization logo" class="logo-img">
      Young Peacemakers
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="about.html">About</a></li>
      <li><a href="programs.html">Programs</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><button class="logout-btn" id="logoutBtn">Log Out</button></li>
    </ul>
  </div>
</nav>

<section class="page-header">
  <div class="container">
    <span class="eyebrow">Parent Dashboard</span>
    <h1 id="welcomeHeading">Welcome</h1>
  </div>
</section>

<section class="section">
  <div class="container dashboard-wrap">

    <div id="statusBanner" class="status-banner status-pending">
      Loading your registration status...
    </div>

    <div class="dashboard-card">
      <h3>Child's Information</h3>
      <div class="info-row"><span class="info-label">Name</span><span class="info-value" id="childName">—</span></div>
      <div class="info-row"><span class="info-label">Age</span><span class="info-value" id="childAge">—</span></div>
      <div class="info-row"><span class="info-label">School</span><span class="info-value" id="childSchool">—</span></div>
      <div class="info-row"><span class="info-label">Program</span><span class="info-value" id="childProgram">—</span></div>
    </div>

    <div class="dashboard-card">
      <h3>Payment Status</h3>
      <div class="info-row"><span class="info-label">Status</span><span class="info-value" id="paymentStatus">—</span></div>
      <a href="payment.html?role=parent" class="btn btn-primary" id="payNowBtn" style="margin-top: var(--space-sm);">Pay Now (1,000 XAF)</a>
    </div>

    <div class="dashboard-card">
      <h3>Announcements</h3>
      <div id="announcementsFeed">
        <p class="placeholder-note">Loading...</p>
      </div>
    </div>

  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <p>&copy; 2026 Young Peacemakers Organization. All rights reserved.</p>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/main.js"></script>
<script src="js/dashboard-parent.js"></script>
</body>
</html>
